<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Zeekr 7X Owner's Manual</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">Owner's Manual</div>
    <div class="sidebar-model">Zeekr<br>7X 2025</div>

    <nav class="sb-nav">
{{SIDEBAR}}
    </nav>

    <div class="sidebar-footer">
      Long Range RWD<br>
      EN · Netherlands
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="search-header">
      <div class="page-label">Full-text search</div>
      <h1 class="page-title">Search<br>the Manual</h1>

      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Try 'charging cable' or 'highway assist'…" autofocus>
      </div>

      <div class="filters" id="filterChips">
        <!-- populated by JS from section names -->
      </div>
    </div>

    <div class="results-meta" id="resultsMeta"></div>
    <div id="results" class="result-list"></div>
  </main>

</div>

<script src="/pagefind/pagefind.js" type="module" id="pagefindScript"></script>
<script type="module">
// Dynamically import pagefind after it's available
let pagefind;

async function initPagefind() {
  try {
    pagefind = await import('/pagefind/pagefind.js');
    await pagefind.options({ excerptLength: 20 });
    // Show initial state
    showState('idle');
  } catch (e) {
    showState('error');
    console.error('Pagefind not found. Run: npx pagefind --site site/', e);
  }
}

// ── Sections (for filter chips + sidebar) ──────────────
const SECTIONS = [
  "About", "Safety", "Hazardous situations", "Charging",
  "Lock and unlock", "Seating, storage, and loading", "Driving",
  "Brake systems", "Driver display", "Driver assistance",
  "Windows", "Center display", "Voice control", "Additional features",
  "Zeekr app", "Climate", "Interior lights",
  "Power outlets and wireless charger", "Wheels and tires",
  "Technical specifications", "Maintenance", "Driver assistance quick guide"
];

let activeSection = null;

// Sidebar expand/collapse
document.querySelectorAll('.sb-section-name').forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.closest('.sb-section');
    const isOpen = section.classList.contains('sb-section--open');
    document.querySelectorAll('.sb-section').forEach(s => {
      s.classList.remove('sb-section--open');
      s.querySelector('.sb-section-name').setAttribute('aria-expanded', 'false');
    });
    section.classList.toggle('sb-section--open', !isOpen);
    btn.setAttribute('aria-expanded', String(!isOpen));
  });
});

// Build filter chips
const filterEl = document.getElementById('filterChips');
const allChip = document.createElement('button');
allChip.className = 'filter-chip active';
allChip.textContent = 'All sections';
allChip.onclick = () => setFilter(null, allChip);
filterEl.appendChild(allChip);

SECTIONS.forEach(s => {
  const chip = document.createElement('button');
  chip.className = 'filter-chip';
  chip.textContent = s;
  chip.onclick = () => setFilter(s, chip);
  filterEl.appendChild(chip);
});

function setFilter(section, el) {
  activeSection = section;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  doSearch(document.getElementById('search-input').value);
}

// ── Search ──────────────────────────────────────────────
let debounceTimer;

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => doSearch(e.target.value), 200);
});

async function doSearch(query) {
  const resultsEl = document.getElementById('results');
  const metaEl = document.getElementById('resultsMeta');

  if (!query.trim()) {
    showState('idle');
    metaEl.textContent = '';
    return;
  }

  if (!pagefind) {
    showState('error');
    return;
  }

  showState('loading');

  const opts = {};
  if (activeSection) {
    opts.filters = { section: activeSection };
  }

  const search = await pagefind.debouncedSearch(query, opts);
  if (!search) return; // debounced away

  const { results } = search;

  if (results.length === 0) {
    showState('empty', query);
    metaEl.textContent = '';
    return;
  }

  metaEl.textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;

  // Load first 10 results
  const data = await Promise.all(results.slice(0, 10).map(r => r.data()));

  resultsEl.innerHTML = '';
  data.forEach(r => {
    const card = document.createElement('a');
    card.className = 'result-card';
    card.href = r.url;

    const section = r.filters?.section?.[0] || '';
    card.innerHTML = `
      <div class="result-section">${section}</div>
      <div class="result-title">${r.meta?.title || 'Untitled'}</div>
      <div class="result-excerpt">${r.excerpt}</div>
    `;
    resultsEl.appendChild(card);
  });
}

function showState(type, query = '') {
  const resultsEl = document.getElementById('results');
  if (type === 'idle') {
    resultsEl.innerHTML = `
      <div class="state-message">
        <span class="big">↑</span>
        Type to search across all ${Object.keys(SECTIONS).length + SECTIONS.length} manual pages
      </div>`;
  } else if (type === 'loading') {
    resultsEl.innerHTML = `<div class="state-message">Searching…</div>`;
  } else if (type === 'empty') {
    resultsEl.innerHTML = `
      <div class="state-message">
        <span class="big">∅</span>
        No results for "<strong>${query}</strong>"
      </div>`;
  } else if (type === 'error') {
    resultsEl.innerHTML = `
      <div class="state-message">
        Search index not built yet.<br><br>
        Run: <code>npx pagefind --site site/</code>
      </div>`;
  }
}

initPagefind();
</script>
</body>
</html>
