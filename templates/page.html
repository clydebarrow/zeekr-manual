<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Zeekr 7X Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">Owner's Manual</div>
    <div class="sidebar-model">Zeekr<br>7X 2025</div>
    <a class="sidebar-search-link" href="/search.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search the manual
    </a>

    <nav class="sb-nav">
{{SIDEBAR}}
    </nav>

    <div class="sidebar-footer">
      Zeekr 7X · 2025<br>
      Long Range RWD<br>
      EN · Netherlands
    </div>
  </aside>

  <main class="main">
    <div class="breadcrumb">
      <a href="/search.html">Manual</a>
      <span>›</span>
      {{SECTION}}
    </div>

    <h1 class="page-title" data-pagefind-meta="title">{{TITLE}}</h1>

    <div class="content" data-pagefind-body data-pagefind-filter="section:{{SECTION}}">
{{CONTENT}}
    </div>
  </main>

</div>
<script>
document.querySelectorAll('.sb-section-name').forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.closest('.sb-section');
    const isOpen = section.classList.contains('sb-section--open');
    document.querySelectorAll('.sb-section:not(.sb-section--active)').forEach(s => {
      s.classList.remove('sb-section--open');
      s.querySelector('.sb-section-name').setAttribute('aria-expanded', 'false');
    });
    if (!section.classList.contains('sb-section--active')) {
      section.classList.toggle('sb-section--open', !isOpen);
      btn.setAttribute('aria-expanded', String(!isOpen));
    }
  });
});
const active = document.querySelector('.sb-page--active');
if (active) active.scrollIntoView({block: 'center', behavior: 'instant'});
</script>
</body>
</html>
