<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Zeekr 7X Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e0ddd6;
  --text: #1a1a1a;
  --muted: #888880;
  --accent: #1a1a1a;
  --warning-bg: #fffbeb;
  --warning-border: #d4a800;
  --note-bg: #f0f4ff;
  --note-border: #4a7aff;
  --caution-bg: #fff4f0;
  --caution-border: #e04a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ── Sidebar ──────────────────────────────────── */
.sidebar {
  background: var(--accent);
  color: var(--bg);
  padding: 40px 28px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(245,244,240,0.45);
  margin-bottom: 6px;
}

.sidebar-model {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--bg);
  margin-bottom: 28px;
  letter-spacing: -0.01em;
}

.sidebar-search-link {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,244,240,0.1);
  border: 1px solid rgba(245,244,240,0.15);
  border-radius: 6px;
  padding: 9px 13px;
  color: rgba(245,244,240,0.75);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 24px;
  transition: background 0.15s;
}
.sidebar-search-link:hover { background: rgba(245,244,240,0.18); }

.sidebar-section-label {
  font-size: 10px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: rgba(245,244,240,0.4);
  margin-bottom: 6px;
}

.sidebar-section-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--bg);
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(245,244,240,0.1);
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 20px;
  font-size: 11px;
  color: rgba(245,244,240,0.3);
  line-height: 1.6;
}

/* ── Sidebar nav ──────────────────────────────── */
.sb-nav {
  flex: 1;
  overflow-y: auto;
  margin: 0 -28px;
  padding: 0 0 16px;
}

.sb-section {
  border-bottom: 1px solid rgba(245,244,240,0.07);
}

.sb-section-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: rgba(245,244,240,0.35);
  padding: 11px 28px 5px;
  /* make it a clickable button visually */
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
}

.sb-section-name::after {
  content: '';
  width: 8px;
  height: 8px;
  border-right: 1.5px solid rgba(245,244,240,0.25);
  border-bottom: 1.5px solid rgba(245,244,240,0.25);
  transform: rotate(-45deg);
  margin-right: 2px;
  flex-shrink: 0;
  transition: transform 0.2s;
}

.sb-section--active .sb-section-name,
.sb-section--open .sb-section-name {
  color: rgba(245,244,240,0.65);
}

.sb-section--active .sb-section-name::after,
.sb-section--open .sb-section-name::after {
  transform: rotate(45deg);
  border-color: rgba(245,244,240,0.5);
}

.sb-pages {
  list-style: none;
  padding: 0 0 8px;
  display: none;
}

.sb-section--active .sb-pages,
.sb-section--open .sb-pages {
  display: block;
}

.sb-pages a {
  display: block;
  font-size: 12px;
  color: rgba(245,244,240,0.5);
  text-decoration: none;
  padding: 4px 28px;
  line-height: 1.5;
  transition: color 0.12s, background 0.12s;
  border-left: 2px solid transparent;
}

.sb-pages a:hover {
  color: rgba(245,244,240,0.9);
  background: rgba(245,244,240,0.05);
}

.sb-pages a.sb-page--active {
  color: #f5f4f0;
  border-left-color: #f5f4f0;
  background: rgba(245,244,240,0.08);
  font-weight: 500;
}

/* ── Main ─────────────────────────────────────── */
.main {
  padding: 48px 56px 80px;
  max-width: 820px;
}

.breadcrumb {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--text); }
.breadcrumb span { margin: 0 8px; opacity: 0.4; }

.page-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

/* ── Content: style the source HTML from Zeekr ── */
.content {
  font-size: 14px;
  line-height: 1.65;
  color: #2a2a2a;
}

/* Headings */
.content h1,
.content h2,
.content .title {
  font-size: 17px;
  font-weight: 600;
  margin: 28px 0 10px;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.content h3,
.content h4,
.content .subtitle {
  font-size: 13px;
  font-weight: 700;
  margin: 24px 0 6px;
  color: var(--text);
  letter-spacing: -0.01em;
}

/* First heading on page — usually redundant with page-title, hide it */
.content > h1:first-child,
.content > h2:first-child {
  display: none;
}

.content p {
  margin-bottom: 12px;
}

.content ul,
.content ol {
  padding-left: 20px;
  margin-bottom: 14px;
}

.content li {
  margin-bottom: 2px;
  padding-left: 3px;
}

.content li p,
.content li > p:first-child {
  margin-bottom: 0;
}

.content li img {
  margin: 4px 0;
}

.content strong, .content b { font-weight: 600; }
.content em, .content i { font-style: italic; }

/* Tables */
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 18px 0;
  font-size: 13px;
}

.content th {
  background: var(--accent);
  color: var(--bg);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 9px 13px;
  text-align: left;
}

.content td {
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.content tr:last-child td { border-bottom: none; }
.content tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

/* Warning / Note / Caution boxes — Zeekr uses class names like these */
.content .warning,
.content [class*="warning"],
.content [data-type="warning"] {
  background: var(--warning-bg);
  border-left: 3px solid var(--warning-border);
  padding: 14px 18px;
  margin: 20px 0;
  border-radius: 0 4px 4px 0;
}

.content .note,
.content [class*="note"],
.content [data-type="note"] {
  background: var(--note-bg);
  border-left: 3px solid var(--note-border);
  padding: 14px 18px;
  margin: 20px 0;
  border-radius: 0 4px 4px 0;
}

.content .caution,
.content [class*="caution"],
.content [data-type="caution"] {
  background: var(--caution-bg);
  border-left: 3px solid var(--caution-border);
  padding: 14px 18px;
  margin: 20px 0;
  border-radius: 0 4px 4px 0;
}

/* Images — hide broken images gracefully, show good ones */
.content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 20px 0;
  border-radius: 4px;
}

.content img[src=""], .content img:not([src]) {
  display: none;
}

/* Links within content — inter-page links */
.content a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--border);
}
.content a:hover {
  text-decoration-color: var(--accent);
}

/* Step lists — numbered procedures */
.content ol.steps,
.content [class*="steps"] ol,
.content [class*="procedure"] ol {
  counter-reset: steps;
  list-style: none;
  padding-left: 0;
}

.content ol.steps li,
.content [class*="steps"] ol li {
  counter-increment: steps;
  padding-left: 36px;
  position: relative;
  margin-bottom: 12px;
}

.content ol.steps li::before,
.content [class*="steps"] ol li::before {
  content: counter(steps);
  position: absolute;
  left: 0;
  top: 2px;
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

/* Responsive */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 28px 20px 60px; }
  .page-title { font-size: 26px; }
}
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">Owner's Manual</div>
    <div class="sidebar-model">Zeekr<br>7X 2025</div>
    <a class="sidebar-search-link" href="/search.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search the manual
    </a>

    <nav class="sb-nav">
{{SIDEBAR}}
    </nav>

    <div class="sidebar-footer">
      Zeekr 7X · 2025<br>
      Long Range RWD<br>
      EN · Netherlands
    </div>
  </aside>

  <main class="main">
    <div class="breadcrumb">
      <a href="/search.html">Manual</a>
      <span>›</span>
      {{SECTION}}
    </div>

    <h1 class="page-title" data-pagefind-meta="title">{{TITLE}}</h1>

    <div class="content" data-pagefind-body data-pagefind-filter="section:{{SECTION}}">
{{CONTENT}}
    </div>
  </main>

</div>
<script>
document.querySelectorAll('.sb-section-name').forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.closest('.sb-section');
    const isOpen = section.classList.contains('sb-section--open');
    // Close all non-active sections
    document.querySelectorAll('.sb-section:not(.sb-section--active)').forEach(s => {
      s.classList.remove('sb-section--open');
      s.querySelector('.sb-section-name').setAttribute('aria-expanded', 'false');
    });
    if (!section.classList.contains('sb-section--active')) {
      section.classList.toggle('sb-section--open', !isOpen);
      btn.setAttribute('aria-expanded', String(!isOpen));
    }
  });
});
</script>
</body>
</html>
